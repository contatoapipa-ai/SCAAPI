{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SCAAPI - Sistema de Cadastro de Animais da APIPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body>
    <header class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'core:home' %}">SCAAPI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{% url 'core:home' %}">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'core:animal_list' %}">Animais</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'core:animal_create' %}">Cadastrar</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'core:contact' %}">Contato</a></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="container mb-5">
      {% block content %}{% endblock %}
    </main>

    <footer class="bg-light text-center py-4 border-top">
      <div class="container">
        <p class="mb-0">SCAAPI &copy; 2026 | Sistema de Cadastro de Animais da APIPA</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
